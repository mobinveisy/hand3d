<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobin Hand 3D Studio</title>
  </head>
  <body>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="three"></canvas>

    <main class="hud">
      <section class="panel glass">
        <div class="brand">✋ Mobin Hand 3D Studio</div>
        <div id="status" class="status">در حال آماده‌سازی...</div>
        <div class="meter"><span id="meterFill"></span></div>
        <div class="tips">
          <b>ژست‌ها</b>
          <p>👌 پینچ با دست راست: ساخت و گرفتن جسم</p>
          <p>✋ حرکت دست: جابه‌جایی جسم انتخاب‌شده</p>
          <p>دو دست باز/بسته: بزرگ‌کوچک کردن و چرخاندن</p>
          <p>کلید Space: تغییر شکل | Backspace: حذف</p>
        </div>
      </section>
      <section class="toolbar glass">
        <button id="shapeBtn">Shape: Box</button>
        <button id="clearBtn">Clear</button>
        <button id="cameraBtn">Start Camera</button>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
