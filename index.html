<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hand Three.js Studio</title>
  </head>
  <body>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="three-canvas"></canvas>

    <main class="hud">
      <h1>Hand 3D Studio</h1>
      <p>🤏 پینچ با انگشت شست و اشاره: ساخت / گرفتن جسم</p>
      <p>✋ حرکت دست: جابه‌جایی جسم انتخاب‌شده</p>
      <p>👐 دو دست: چرخش و بزرگ‌/کوچک کردن</p>
      <div class="buttons">
        <button id="shapeBox">Cube</button>
        <button id="shapeSphere">Sphere</button>
        <button id="shapeTorus">Torus</button>
        <button id="clearScene">Clear</button>
      </div>
      <small id="status">در حال آماده‌سازی دوربین...</small>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
